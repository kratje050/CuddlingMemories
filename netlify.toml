[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "node_modules/@img/sharp-linux-x64/**",
    "node_modules/@img/sharp-libvips-linux-x64/**"
  ]

[[headers]]
  for = "/images/portfolio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/home/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/pages/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/admin-app/*"
  to = "/admin-app/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
